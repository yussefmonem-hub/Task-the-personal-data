<html>

<head>
    <title> The Form Person Data </title>
</head>

<body>
    <form action="">
        <fieldset style="
          background-color: rgba(165, 42, 42, 0.977);
          color: rgb(137, 43, 226);
        ">
            <legend style="background-color: rgb(43, 226, 76); color: #fff">
                Person Data
            </legend>

            <table width="100%" border="1">

                </legend>
                <tr>
                    <td><br><br><br><br>
                        <form>
                            <fieldset style="background-color: rgb(3, 120, 81)">
                                <legend style="background-color: rgb(138, 43, 226); color: #fff">
                                    Your Name
                                </legend>
                                <table>

                                    <tbody>
                                        <tr>
                                            <td><label for="fname" style="color:rgb(138, 43, 226) ;"> First Name:
                                                </label></td>
                                            <td><input type="text" id="fname" name="fname"></td>
                                        </tr>
                                        <tr>
                                            <td><label for="sname" style="color:rgb(138, 43, 226) ;"> Second Name:
                                                </label></td>
                                            <td><input type="text" id="sname" name="sname"></td>
                                        </tr>


                                    </tbody>

                                </table>

                        </form>
                    </td>
                </tr>
            </table>
            <br><br><br><br><br><br><br>
            <table>

                <tbody>
                    <tr>
                        <td><label for="your phone" style="color:rgb(138, 43, 226) ;"> your phone: </label></td>
                        <td><input type="text" id="your phone" name="your phone"></td>
                    </tr>
                    <tr>
                        <td><label for="your email" style="color:rgb(138, 43, 226) ;"> your email: </label></td>
                        <td><input type="text" id="your email" name="your email"></td>
                    </tr>
                    <tr>
                        <td><label for="your password" style="color:rgb(138, 43, 226) ;"> your password: </label></td>
                        <td><input type="text" id="your password" name="your password"></td>
                    </tr>
                    <tr>
                        <td><label for="re password" style="color:rgb(138, 43, 226) ;"> re password: </label></td>
                        <td><input type="text" id="re password" name="re password"></td>
                    </tr>
                </tbody>

                <table><br><br><br><br><br><br>
                    <tbody>
                        <tr>
                            <td><label for="male" style="color:rgb(138, 43, 226) ;">male:</label></td>

                            <td><input type="radio" name="gender" value="male" id="male" /></td>
                        </tr>
                        <tr>
                            <td><label for="female" style="color:rgb(138, 43, 226) ;">female:</label></td>

                            <td>
                                <input type="radio" name="gender" value="female" id="female" />
                            </td>
                        </tr>
                    </tbody>
                </table>
                <table><br><br><br><br>
                    <tbody>
                        <tr>
                            <td><label for="student" style="color:rgb(138, 43, 226) ;">student:</label></td>

                            <td>
                                <input type="checkbox" name="type" value="student" id="student" />
                            </td>
                        </tr>
                        <tr>
                            <td><label for="graduated" style="color:rgb(138, 43, 226) ;">graduated:</label></td>
                            <td>
                                <input type="checkbox" name="type" value="graduated" id="graduated" />
                            </td>

                        </tr>
                    </tbody>
                </table>
                <br><br><br><br>
                <label for="cars">Choose a car:</label>
                <select name="cars" id="cars">
                    <optgroup label="Swedish Cars">
                        <option value="volvo">Volvo</option>
                        <option value="saab">Saab</option>
                    </optgroup>
                    <optgroup label="German Cars">
                        <option value="mercedes">Mercedes</option>
                        <option value="audi">Audi</option>
                    </optgroup>
                </select>

            </table>
            <br><br><br>
            <button style="width: 10%; padding: 0" type="submit">
                <img style="width: 100%; cursor: pointer" src="./img/btn.jpg" alt="button submit" />
            </button>

</html>
